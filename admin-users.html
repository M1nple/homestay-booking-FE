<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Admin Users
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div id="navbar"></div>

    <main
        class="
            max-w-7xl
            mx-auto
            py-10
            px-6
        "
    >

        <div
            class="
                flex
                justify-between
                items-center
                mb-8
            "
        >

            <h1
                class="
                    text-4xl
                    font-bold
                "
            >
                Users Management
            </h1>

        </div>

        <div
            class="
                bg-white
                rounded-3xl
                shadow
                overflow-hidden
            "
        >

            <table
                class="
                    w-full
                    text-left
                "
            >

                <thead
                    class="
                        bg-gray-100
                    "
                >

                    <tr>

                        <th class="p-4">
                            ID
                        </th>

                        <th class="p-4">
                            Full Name
                        </th>

                        <th class="p-4">
                            Email
                        </th>

                        <th class="p-4">
                            Phone
                        </th>

                        <th class="p-4">
                            Role
                        </th>

                        <th class="p-4">
                            Verified
                        </th>

                        <th class="p-4">
                            Active
                        </th>

                        <th class="p-4">
                            Created
                        </th>

                    </tr>

                </thead>

                <tbody
                    id="usersTable"
                >

                    <tr>

                        <td
                            colspan="8"
                            class="
                                p-6
                                text-center
                                text-gray-500
                            "
                        >
                            Loading...
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/admin-users.js"></script>

</body>

</html>
