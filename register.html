<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center">

    <!-- Card -->
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">

        <!-- Title -->
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Create Account
        </h1>

        <!-- Form -->
        <form id="registerForm" class="space-y-4">

            <!-- Full name -->
            <div>
                <label class="text-sm text-gray-600">Full name</label>
                <input
                    id="fullName"
                    type="text"
                    placeholder="Enter your full name"
                    class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                />
            </div>

            <!-- Email -->
            <div>
                <label class="text-sm text-gray-600">Email</label>
                <input
                    id="email"
                    type="email"
                    placeholder="Enter your email"
                    class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                />
            </div>

            <!-- Phone -->
            <div>
                <label class="text-sm text-gray-600">Phone</label>
                <input
                    id="phone"
                    type="text"
                    placeholder="Enter your phone number"
                    class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                />
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input
                    id="password"
                    type="password"
                    placeholder="Enter your password"
                    class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required
                />
            </div>

            <!-- Button -->
            <button
                type="submit"
                id="registerBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition"
            >
                Create account
            </button>

        </form>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-5">
            Already have an account?
            <a href="login.html" class="text-blue-600 font-medium hover:underline">
                Login
            </a>
        </p>

    </div>

    
    
    <div id="toast" class="fixed top-5 right-5 hidden bg-black text-white px-4 py-2 rounded"></div>
    
    <script>
    function showToast(message) {
        const toast = document.getElementById("toast");
        
        toast.innerText = message;
        toast.classList.remove("hidden");
        
        setTimeout(() => {
            toast.classList.add("hidden");
        }, 3000);
    }
    </script>
    <!-- JS -->
    <!-- <script src="js/apiRequest.js"></script> -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/register.js"></script>
</body>

</html>
