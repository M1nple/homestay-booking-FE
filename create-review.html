<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Create Review</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div id="navbar"></div>

<main
    class="
        max-w-3xl
        mx-auto
        py-10
        px-6
    "
>

    <div
        class="
            bg-white
            p-8
            rounded-3xl
            shadow
        "
    >

        <h1
            class="
                text-3xl
                font-bold
                mb-6
            "
        >
            Write Review
        </h1>

        <form id="reviewForm">

            <div class="mb-5">

                <label class="font-medium">
                    Rating
                </label>

                <select
                    id="rating"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                        mt-2
                    "
                >
                    <option value="5">5 ⭐</option>
                    <option value="4">4 ⭐</option>
                    <option value="3">3 ⭐</option>
                    <option value="2">2 ⭐</option>
                    <option value="1">1 ⭐</option>
                </select>

            </div>

            <div class="mb-5">

                <label class="font-medium">
                    Comment
                </label>

                <textarea
                    id="comment"
                    rows="5"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                        mt-2
                    "
                ></textarea>

            </div>

            <div class="mb-6">

                <label class="font-medium">
                    Images
                </label>

                <input
                    id="images"
                    type="file"
                    multiple
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                        mt-2
                    "
                >

            </div>

            <button
                class="
                    bg-rose-500
                    text-white
                    px-6
                    py-3
                    rounded-xl
                "
            >
                Submit Review
            </button>

        </form>

    </div>

</main>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="components/navbar.js"></script>
<script src="assets/js/create-review.js"></script>

</body>
</html>
