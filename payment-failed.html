<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Payment Failed
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div id="navbar"></div>

    <main
        class="
            max-w-3xl
            mx-auto
            py-16
            px-6
        "
    >

        <div
            class="
                bg-white
                rounded-3xl
                shadow
                p-10
                text-center
            "
        >

            <div
                class="
                    text-8xl
                    mb-6
                "
            >
                ❌
            </div>

            <h1
                class="
                    text-4xl
                    font-bold
                    mb-4
                    text-red-600
                "
            >
                Payment Failed
            </h1>

            <p
                class="
                    text-gray-500
                    mb-8
                "
            >
                The payment could not be completed.
            </p>

            <div
                id="errorInfo"
                class="
                    bg-red-50
                    text-red-600
                    rounded-xl
                    p-4
                    mb-8
                "
            >
            </div>

            <div
                class="
                    flex
                    justify-center
                    gap-4
                "
            >

                <a
                    href="my-bookings.html"
                    class="
                        bg-rose-500
                        text-white
                        px-6
                        py-3
                        rounded-xl
                    "
                >
                    My Bookings
                </a>

                <a
                    href="index.html"
                    class="
                        border
                        px-6
                        py-3
                        rounded-xl
                    "
                >
                    Back Home
                </a>

            </div>

        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="components/navbar.js"></script>

    <script>

        document.getElementById(
            "navbar"
        ).innerHTML =
            renderNavbar();

        const code =
            new URLSearchParams(
                location.search
            ).get("code");

        document.getElementById(
            "errorInfo"
        ).innerHTML =
            code
            ? `VNPay Response Code: ${code}`
            : "Payment failed or cancelled.";

    </script>

</body>

</html>
