<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Homestay Rooms
    </title>

    <script src="https://cdn.tailwindcss.com"></script>



</head>

<body class="bg-gray-100">

    <div id="navbar"></div>



    <main
        class="
            max-w-7xl
            mx-auto
            py-10
            px-6
        "
    >

        <div
            class="
                flex
                justify-between
                items-center
                mb-8
            "
        >

            <h1
                id="pageTitle"
                class="
                    text-4xl
                    font-bold
                "
            >
                Rooms
            </h1>

            <a
                id="createRoomBtn"
                class="
                    bg-rose-500
                    text-white
                    px-5
                    py-3
                    rounded-xl
                "
            >
                + Add Room
            </a>

        </div>

        <div
            id="roomsContainer"
            class="
                grid
                md:grid-cols-2
                lg:grid-cols-3
                gap-6
            "
        >
        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/host-rooms.js"></script>

</body>

</html>
