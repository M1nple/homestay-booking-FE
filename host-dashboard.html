<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Host Dashboard
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div id="navbar"></div>

    <main
        class="
            max-w-7xl
            mx-auto
            py-10
            px-6
        "
    >

        <h1
            class="
                text-4xl
                font-bold
                mb-8
            "
        >
            Host Dashboard
        </h1>

        <div
            id="stats"
            class="
                grid
                md:grid-cols-4
                gap-6
                mb-10
            "
        >
        </div>

        <div
            class="
                grid
                lg:grid-cols-2
                gap-8
            "
        >

            <div
                class="
                    bg-white
                    rounded-3xl
                    shadow
                    p-6
                "
            >

                <h2
                    class="
                        text-2xl
                        font-bold
                        mb-6
                    "
                >
                    Homestays
                </h2>

                <div
                    id="homestaysContainer"
                    class="space-y-4"
                >
                </div>

            </div>

            <div
                class="
                    bg-white
                    rounded-3xl
                    shadow
                    p-6
                "
            >

                <h2
                    class="
                        text-2xl
                        font-bold
                        mb-6
                    "
                >
                    Recent Bookings
                </h2>

                <div
                    id="bookingsContainer"
                    class="space-y-4"
                >
                </div>

            </div>

        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/host-dashboard.js"></script>

</body>

</html>
