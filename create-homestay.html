<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Homestay</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div id="navbar"></div>

    <main
        class="
            max-w-3xl
            mx-auto
            py-10
            px-6
        "
    >

        <div
            class="
                bg-white
                rounded-3xl
                shadow
                p-8
            "
        >

            <h1
                class="
                    text-3xl
                    font-bold
                    mb-8
                "
            >
                Create Homestay
            </h1>

            <form
                id="homestayForm"
                class="space-y-5"
            >

                <input
                    id="name"
                    type="text"
                    placeholder="Homestay Name"
                    required
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >

                <input
                    id="address"
                    type="text"
                    placeholder="Address"
                    required
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >

                <textarea
                    id="description"
                    placeholder="Description"
                    rows="4"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                ></textarea>

                <select
                    id="province"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >
                </select>

                <select
                    id="district"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >
                </select>

                <select
                    id="ward"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >
                </select>

                <input
                    type="file"
                    id="images"
                    multiple
                    accept="image/*"
                    class="
                        w-full
                        border
                        p-3
                        rounded-xl
                    "
                >

                <button
                    type="submit"
                    class="
                        w-full
                        bg-rose-500
                        text-white
                        py-4
                        rounded-xl
                    "
                >
                    Create Homestay
                </button>

            </form>

        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/create-homestay.js"></script>

</body>

</html>
