<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Booking</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div id="navbar"></div>

    <main class="max-w-4xl mx-auto py-10 px-6">

        <div
            class="bg-white rounded-3xl shadow p-8">

            <h1
                class="text-3xl font-bold mb-8">

                Create Booking

            </h1>

            <div id="roomInfo"
                 class="mb-8"></div>

            <form id="bookingForm"
                  class="space-y-6">

                <div>

                    <label
                        class="block mb-2">

                        Check In

                    </label>

                    <input
                        type="date"
                        id="checkIn"
                        required
                        class="
                            w-full
                            border
                            rounded-xl
                            p-3
                        ">

                </div>

                <div>

                    <label
                        class="block mb-2">

                        Check Out

                    </label>

                    <input
                        type="date"
                        id="checkOut"
                        required
                        class="
                            w-full
                            border
                            rounded-xl
                            p-3
                        ">

                </div>

                <div>

                    <label
                        class="block mb-2">

                        Guests

                    </label>

                    <input
                        type="number"
                        id="guests"
                        min="1"
                        value="1"
                        required
                        class="
                            w-full
                            border
                            rounded-xl
                            p-3
                        ">

                </div>

                <button
                    type="submit"
                    class="
                        w-full
                        bg-rose-500
                        text-white
                        py-4
                        rounded-xl
                        font-semibold
                    ">

                    Book & Pay

                </button>

            </form>

        </div>

        <div
            id="toast"
            class="
                hidden
                fixed
                top-5
                right-5
                bg-red-500
                text-white
                px-6
                py-3
                rounded-xl
                shadow-lg
                z-50
            ">
        </div>

    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/booking.js"></script>


</body>

</html>
