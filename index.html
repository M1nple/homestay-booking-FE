<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Homestay Booking
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

    <div id="navbar"></div>

    <!-- HERO -->

    <section
        class="
            bg-gradient-to-r
            from-rose-500
            to-pink-500
            text-white
        "
    >

        <div
            class="
                max-w-7xl
                mx-auto
                px-6
                py-24
            "
        >

            <h1
                class="
                    text-5xl
                    font-bold
                    mb-4
                "
            >
                Find Your Perfect Stay
            </h1>

            <p
                class="
                    text-xl
                    mb-10
                "
            >
                Discover amazing homestays across Vietnam
            </p>

            <!-- SEARCH BOX -->

            <div
                class="
                    bg-white
                    rounded-3xl
                    p-6
                    shadow-xl
                    text-gray-800
                "
            >

                <div
                    class="
                        grid
                        md:grid-cols-5
                        gap-4
                    "
                >

                    <input
                        id="search"
                        type="text"
                        placeholder="Location or Homestay Name"
                        class="
                            border
                            p-3
                            rounded-xl
                        "
                    >

                    <input
                        id="guests"
                        type="number"
                        min="1"
                        placeholder="Guests"
                        class="
                            border
                            p-3
                            rounded-xl
                        "
                    >

                    <input
                        id="minPrice"
                        type="number"
                        placeholder="Min Price"
                        class="
                            border
                            p-3
                            rounded-xl
                        "
                    >

                    <input
                        id="maxPrice"
                        type="number"
                        placeholder="Max Price"
                        class="
                            border
                            p-3
                            rounded-xl
                        "
                    >

                    <select
                        id="ordering"
                        class="
                            border
                            p-3
                            rounded-xl
                        "
                    >
                        <option value="">
                            Sort By
                        </option>

                        <option value="name">
                            Name A-Z
                        </option>

                        <option value="-name">
                            Name Z-A
                        </option>
                    </select>

                </div>

                <button
                    id="searchBtn"
                    class="
                        mt-5
                        bg-rose-500
                        text-white
                        px-8
                        py-3
                        rounded-xl
                    "
                >
                    Search Homestays
                </button>

            </div>

        </div>

    </section>

    <!-- HOMESTAYS -->

    <section
        class="
            max-w-7xl
            mx-auto
            px-6
            py-16
        "
    >

        <div
            class="
                flex
                justify-between
                items-center
                mb-8
            "
        >

            <h2
                class="
                    text-3xl
                    font-bold
                "
            >
                Available Homestays
            </h2>

        </div>

        <div
            id="homestaysGrid"
            class="
                grid
                grid-cols-1
                md:grid-cols-2
                lg:grid-cols-4
                gap-6
            "
        >
        </div>

    </section>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/home.js"></script>

</body>

</html>
